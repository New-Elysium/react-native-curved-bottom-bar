pre-commit:
  parallel: true
  commands:
    lint:
      files: git diff --name-only @{push}
      glob: "*.{js,ts,jsx,tsx}"
      run: bunx eslint {files}
    types:
      files: git diff --name-only @{push}
      glob: "*.{js,ts, jsx, tsx}"
      run: bunx tsc --noEmit
commit-msg:
  parallel: true
  commands:
    commitlint:
      run: bunx commitlint --edit
